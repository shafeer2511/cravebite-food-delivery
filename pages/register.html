<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">

    <!-- per page -->
    <link rel="stylesheet" href="../css/pages/profile.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>

<body>
    <header class="navbar">
        <div class="logo">
            <a href="../pages/index.html" class="logo-style">
                <span class="material-icons">restaurant</span>
                CraveBite
            </a>
        </div>
        <nav>
            <a href="../pages/index.html">Home</a>
            <a href="../pages/restaurants.html">Restaurants</a>
            <a href="../pages/orders.html">Orders</a>
            <a href="../pages/cart.html">Cart</a>
            <span id="nav-user"></span>
        </nav>
    </header>
    <main>
        <div class="container">
            <h2 class="page-title">Register</h2>
            <div class="form-card">
                <form action="" id="register-form">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" placeholder="Enter your name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="Enter your email" required>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" placeholder="Enter phone number" maxlength="10" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Create password" minlength="6" required>
                    </div>

                    <div class="form-group">
                        <label for="confirm">Confirm Password</label>
                        <input type="password" id="confirm" placeholder="Confirm password" required>
                    </div>

                    <button type="submit" class="btn">Register</button>

                    <p class="form-link">
                        Already have an account?
                        <a href="../pages/login.html">Login</a>
                    </p>
                </form>
            </div>
        </div>
    </main>
    <footer class="footer">
        <p>&copy; 2026 Foodie. All rights reserved.</p>
    </footer>
    <script type="module" src="../js/main.js"></script>
</body>
