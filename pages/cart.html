<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Your Cart</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">

    <!-- per page -->
    <link rel="stylesheet" href="../css/pages/cart.css">

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>

<body>

    <!-- NAVBAR -->
    <header class="navbar">
        <div class="logo">
            <a href="../pages/index.html" class="logo-style">
                <span class="material-icons">restaurant</span>
                CraveBite
            </a>
        </div>
        <nav>
            <a href="../pages/index.html">Home</a>
            <a href="../pages/restaurants.html">Restaurants</a>
            <a href="../pages/orders.html">Orders</a>
            <a href="../pages/cart.html">Cart</a>
            <div id="nav-profile"></div>
        </nav>
    </header>

    <!-- MAIN -->
    <main>
        <div class="container">

            <h2 class="page-title">Your Cart</h2>

            <div class="cart-layout">

                <!-- LEFT: CART ITEMS -->
                <div class="cart-items" id="cart-items">
                    <!-- JS will dynamically insert cart items here -->
                </div>

                <!-- RIGHT: ORDER SUMMARY -->
                <div class="order-summary">

                    <h3>Order Summary</h3>

                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span id="subtotal">₹0</span>
                    </div>

                    <div class="summary-row">
                        <span>Delivery</span>
                        <span id="delivery">₹50</span>
                    </div>

                    <div class="summary-row">
                        <span>Tax (5%)</span>
                        <span id="tax">₹0</span>
                    </div>

                    <div class="summary-row total">
                        <span>Total</span>
                        <span id="total">₹0</span>
                    </div>

                    <hr>

                    <button class="checkout-btn" id="checkout-btn">
                        Proceed to Checkout →
                    </button>

                </div>

            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
        <p>&copy; 2026 Foodie. All rights reserved.</p>
    </footer>

    <!-- JS -->
    <script type="module" src="../js/main.js"></script>

</body>

</html>
