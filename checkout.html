<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <a href="index.html" style="text-decoration: none; color: white; font-size: 20px; font-weight: 600;">
                <span class="material-icons">restaurant</span>
                CraveBite
            </a>
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="restaurants.html">Restaurants</a>
            <a href="orders.html">Orders</a>
            <a href="cart.html">Cart</a>
            <a href="login.html">Login</a>
        </nav>
    </header>
    <main>
        <div class="container">
            <h2 class="page-title">Checkout</h2>
            <div class="checkout-layout">
                <!-- LEFT SIDE 60% : ADDRESS SELECTION -->
                <div class="address-section">
                    <h3>Select Address</h3>
                    <div class="address-card">
                        <input type="radio" name="address" id="address" checked>
                        <div class="address-info">
                            <p><strong>John Doe</strong></p>
                            <p>12 Main Street</p>
                            <p>Chennai, Tamil Nadu</p>
                            <p>600001</p>
                        </div>
                    </div>

                    <div class="address-card">
                        <input type="radio" name="address" id="address">
                        <div class="address-info">
                            <p><strong>John Doe</strong></p>
                            <p>45 Park Avenue</p>
                            <p>Coimbatore, Tamil Nadu</p>
                            <p>641001</p>
                    </div>
                </div>
                <button class="address-btn" >Add New Address</button>
            </div>

            <!-- RIGHT SIDE 40% : ORDER SUMMARY -->

            <div class="order-summary">
                <h3>Order Summary</h3>
                <div class="summary-row">
                   <span>Subtotal</span>
                   <span>₹519</span>
                </div>
                <div class="summary-row">
                    <span>Delivery</span>
                    <span>₹50</span>
                </div>
                <div class="summary-row">
                    <span>Tax</span>
                    <span>₹50</span>
                </div>
                <div class="summary-row total">
                    <span>Total</span>
                    <span>₹619</span>
                </div>
                <hr>
                <button class="checkout-btn"><a href=payment.html style="text-decoration: none; color: white; font-size: 16px; font-weight: 600;">Proceed to payment</a></button>   
            </div>
        </div>
    </main>
    <footer class="footer">
    <p>&copy; 2026 Foodie. All rights reserved.</p>
</footer>
</body>
</html>
